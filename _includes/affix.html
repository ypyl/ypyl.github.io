<!-- Scroll-to-top affix button -->
<span class="affix-wrapper" id="affix-top-wrapper" style="visibility:hidden;">
  <button id="affix-top" class="affix-button" aria-label="Scroll to top" title="Scroll to top" style="opacity:0;pointer-events:none;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>
</span>

<script>
(function() {
  var btn = document.getElementById('affix-top');
  var wrapper = document.getElementById('affix-top-wrapper');
  if (!btn || !wrapper) return;

  // -- Zoom compensation --

  // Capture the CSS-computed corner gap before any inline style overrides
  var wrapperStyle = getComputedStyle(wrapper);
  var baseBottom = parseFloat(wrapperStyle.bottom);
  var baseRight = parseFloat(wrapperStyle.right);

  // outerWidth (device pixels) stays constant when zooming;
  // innerWidth (CSS pixels) scales with zoom.
  // Their ratio gives the browser zoom level, even on pre-zoomed page loads.
  function getZoomRatio() {
    return window.outerWidth / window.innerWidth;
  }

  function updateZoomCompensation() {
    var zoom = getZoomRatio();
    if (Math.abs(zoom - 1) > 0.02) {
      wrapper.style.transform = 'scale(' + (1 / zoom) + ')';
      wrapper.style.bottom = (baseBottom / zoom) + 'px';
      wrapper.style.right = (baseRight / zoom) + 'px';
    } else {
      wrapper.style.transform = '';
      wrapper.style.bottom = '';
      wrapper.style.right = '';
    }
  }

  // Measure and compensate before making visible
  updateZoomCompensation();
  wrapper.style.visibility = 'visible';

  window.addEventListener('resize', updateZoomCompensation, { passive: true });

  // -- Scroll show/hide --

  var threshold = 200;
  var shown = false;

  function onScroll() {
    var shouldShow = window.scrollY > threshold;
    if (shouldShow === shown) return;
    shown = shouldShow;
    btn.style.opacity = shouldShow ? '1' : '0';
    btn.style.pointerEvents = shouldShow ? 'auto' : 'none';
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll(); // initial check

  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
