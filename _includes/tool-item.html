<li class="tool"
    data-tool-name="{{ include.tool.name | downcase }}"
    data-tool-desc="{{ include.tool.description | downcase }}"
    data-tool-tags="{% for tag in include.tool.tags %}{{ tag | downcase }} {% endfor %}">
  <a href="{{ include.tool.link }}" target="_blank">
    {{ include.tool.name }}
  </a>

  <p>{{ include.tool.description }}</p>

  <div class="tags">
    {% for tag in include.tool.tags %}
      <span class="tag">{{ tag }}</span>
    {% endfor %}
  </div>
</li>
