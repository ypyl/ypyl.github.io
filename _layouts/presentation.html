<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
{%- include head.html -%}
<body class="presentation-page">

  <div class="reveal">
    <div class="slides">
      <!-- Slides injected by JS -->
    </div>
  </div>

  <!-- Raw rendered content, hidden from view, split into slides by JS -->
  <div id="presentation-content" style="display:none;">
    {{ content }}
  </div>

  <!-- Theme toggle button (sun/moon) -->
  <button id="presentation-theme-toggle" class="presentation-theme-toggle" aria-label="Toggle theme" title="Toggle light/dark theme">
    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="5"></circle>
      <line x1="12" y1="1" x2="12" y2="3"></line>
      <line x1="12" y1="21" x2="12" y2="23"></line>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
      <line x1="1" y1="12" x2="3" y2="12"></line>
      <line x1="21" y1="12" x2="23" y2="12"></line>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
  </button>

  <!-- Close button — navigate back to article -->
  <button id="presentation-close" class="presentation-close" aria-label="Exit presentation" title="Exit presentation (Esc)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <!-- Font size controls -->
  <div id="presentation-font-controls" class="presentation-font-controls">
    <button id="font-size-down" class="font-size-btn" aria-label="Decrease font size" title="Smaller text">A⁻</button>
    <button id="font-size-up" class="font-size-btn" aria-label="Increase font size" title="Larger text">A⁺</button>
  </div>

  <!-- Reveal.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/highlight/highlight.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>

  <script>
    (function() {
      // --- Theme management ---
      function getTheme() {
        var stored = localStorage.getItem('theme');
        if (stored === 'dark' || stored === 'light') return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        var revealEl = document.querySelector('.reveal');
        if (revealEl) revealEl.setAttribute('data-theme', theme);

        // Toggle icons
        var sunIcon = document.querySelector('.sun-icon');
        var moonIcon = document.querySelector('.moon-icon');
        if (sunIcon && moonIcon) {
          sunIcon.style.display = theme === 'dark' ? 'block' : 'none';
          moonIcon.style.display = theme === 'dark' ? 'none' : 'block';
        }
      }

      function toggleTheme() {
        var current = getTheme();
        var next = current === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        applyTheme(next);
      }

      // Apply theme on load
      applyTheme(getTheme());

      // Theme toggle button
      var themeBtn = document.getElementById('presentation-theme-toggle');
      if (themeBtn) {
        themeBtn.addEventListener('click', toggleTheme);
      }

      // Close button — navigate back
      var closeBtn = document.getElementById('presentation-close');
      if (closeBtn) {
        closeBtn.addEventListener('click', function() {
          if (document.referrer && document.referrer.indexOf(window.location.origin) === 0) {
            window.location.href = document.referrer;
          } else {
            window.history.back();
          }
        });
      }

      // --- Font size controls ---
      var FONT_SCALE_KEY = 'presentation-font-scale-v2';
      var FONT_BASE = 16; // px
      var FONT_STEP = 0.125; // rem step (~2px at base 16)
      var FONT_MIN = 0.75;  // 12px
      var FONT_MAX = 2.0;   // 32px

      function getFontScale() {
        var stored = localStorage.getItem(FONT_SCALE_KEY);
        if (stored) {
          var parsed = parseFloat(stored);
          if (!isNaN(parsed)) return Math.max(FONT_MIN, Math.min(FONT_MAX, parsed));
        }
        return 2.0;
      }

      function applyFontScale(scale) {
        document.documentElement.style.fontSize = (FONT_BASE * scale) + 'px';
      }

      function changeFontSize(delta) {
        var current = getFontScale();
        var next = Math.round((current + delta) * 1000) / 1000;
        next = Math.max(FONT_MIN, Math.min(FONT_MAX, next));
        localStorage.setItem(FONT_SCALE_KEY, next);
        applyFontScale(next);
      }

      applyFontScale(getFontScale());

      var fontUp = document.getElementById('font-size-up');
      var fontDown = document.getElementById('font-size-down');
      if (fontUp) fontUp.addEventListener('click', function() { changeFontSize(FONT_STEP); });
      if (fontDown) fontDown.addEventListener('click', function() { changeFontSize(-FONT_STEP); });

      // Esc key also exits presentation (when not in overview)
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          // Reveal overview is triggered by Esc; let Reveal handle it first
          // If already in overview (or after a short delay), check and exit
          setTimeout(function() {
            if (!document.querySelector('.reveal.overview')) {
              if (document.referrer && document.referrer.indexOf(window.location.origin) === 0) {
                window.location.href = document.referrer;
              } else {
                window.history.back();
              }
            }
          }, 100);
        }
      });

      // --- Slide parsing ---
      var rawEl = document.getElementById('presentation-content');
      if (!rawEl) return;

      // Jekyll renders --- as <hr /> or <hr>
      var rawHTML = rawEl.innerHTML;
      var segments = rawHTML.split(/<hr\s*\/?\s*>/i).filter(function(s) {
        return s.trim().length > 0;
      });

      var slidesContainer = document.querySelector('.reveal .slides');
      if (!slidesContainer) return;

      segments.forEach(function(segment) {
        var section = document.createElement('section');
        section.innerHTML = segment;

        // Convert > **Notes:** blockquotes to <aside class="notes">
        var blockquotes = section.querySelectorAll('blockquote');
        blockquotes.forEach(function(bq) {
          var firstP = bq.querySelector('p');
          if (!firstP) return;
          var strongEl = firstP.querySelector('strong');
          if (!strongEl) return;
          if (strongEl.textContent.trim().startsWith('Notes:')) {
            // Remove "Notes:" from the content, keep the rest
            var noteText = firstP.innerHTML.replace(/<strong>Notes:<\/strong>\s*/, '').trim();
            var aside = document.createElement('aside');
            aside.className = 'notes';
            aside.innerHTML = noteText;
            bq.replaceWith(aside);
          }
        });

        slidesContainer.appendChild(section);
      });

      // --- Bridge: strip Rouge spans, pass language hints to highlight.js ---
      // Kramdown/Rouge pre-highlights fenced code blocks (<span class="nb"> etc.),
      // which highlight.js skips because the <code> already has children.
      // We strip Rouges's spans and copy the language-bash/etc. class from the
      // wrapper div to the <code> element so highlight.js can do its own work.
      (function() {
        var slidesEl = document.querySelector('.reveal .slides');
        if (!slidesEl) return;

        var codeBlocks = slidesEl.querySelectorAll('pre code');
        codeBlocks.forEach(function(code) {
          // Find Kramdown's wrapper: div.language-{name}.highlighter-rouge
          var wrapper = code.closest('div.highlighter-rouge');
          if (!wrapper) return;

          var match = wrapper.className.match(/language-(\w[\w-]*)/);
          if (!match) return;

          var lang = match[1];

          // Skip plaintext blocks (no language was specified in markdown)
          if (lang === 'plaintext') return;

          // Strip Rouge spans to get clean text for highlight.js
          if (code.children.length > 0) {
            code.textContent = code.textContent;
          }

          // Tell highlight.js which language to use
          code.classList.add('language-' + lang);
        });
      })();

      // --- Reveal.js initialization ---
      Reveal.initialize({
        width: 1600,
        height: 900,
        margin: 0.05,
        controls: true,
        progress: true,
        slideNumber: 'c/t',
        history: true,
        center: false,
        transition: 'slide',
        plugins: [ RevealMarkdown, RevealHighlight, RevealNotes ]
      });

      // Sync theme after Reveal init
      applyTheme(getTheme());
    })();
  </script>
</body>
</html>
