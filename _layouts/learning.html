---
layout: default
---

<div class="resources-page">

  <div class="resources-search">
    <input
      type="text"
      id="resources-search-input"
      placeholder="Search resources"
      aria-label="Search resources"
      autocomplete="off"
    />
    <button type="button" id="resources-search-clear" class="resources-search-clear" aria-label="Clear search" title="Clear search">&times;</button>
  </div>

  {% assign resources_sorted = site.learning | sort: "date" | reverse %}

  <div id="resources-list">
    <ul class="resource-list">
      {% for resource in resources_sorted %}
        {% include learning-item.html resource=resource %}
      {% endfor %}
    </ul>
  </div>

  <div id="resources-no-results" class="resources-no-results" style="display: none;">
    <p>No resources match your search.</p>
  </div>

  <script>
    (function() {
      var input = document.getElementById('resources-search-input');
      var listContainer = document.getElementById('resources-list');
      var noResults = document.getElementById('resources-no-results');

      if (!input || !listContainer) return;

      var clearBtn = document.getElementById('resources-search-clear');

      function filterResources() {
        var query = input.value.trim().toLowerCase();
        var resources = listContainer.querySelectorAll('.resource');
        var anyVisible = false;

        resources.forEach(function(resource) {
          var name = resource.getAttribute('data-resource-name') || '';
          var desc = resource.getAttribute('data-resource-desc') || '';
          var tags = resource.getAttribute('data-resource-tags') || '';
          var match = name.indexOf(query) !== -1 ||
                      desc.indexOf(query) !== -1 ||
                      tags.indexOf(query) !== -1;

          if (match || query === '') {
            resource.style.display = '';
            anyVisible = true;
          } else {
            resource.style.display = 'none';
          }
        });

        noResults.style.display = anyVisible ? 'none' : 'block';

        if (clearBtn) {
          clearBtn.style.display = query === '' ? 'none' : 'inline-block';
        }
      }

      input.addEventListener('input', filterResources);

      if (clearBtn) {
        clearBtn.addEventListener('click', function() {
          input.value = '';
          input.focus();
          filterResources();
        });
      }

      filterResources();
    })();
  </script>

</div>
